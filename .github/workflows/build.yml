name: Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── macOS executable ──────────────────────────────────────────────────────
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create and activate venv, install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build macOS app
        run: |
          source .venv/bin/activate
          pyinstaller --onefile --windowed \
            --collect-all customtkinter \
            --distpath build \
            --workpath /tmp/pyinstaller-build \
            --name TestBoard \
            testBoard_script.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: TestBoard-macOS
          path: build/TestBoard.app

  # ── Windows executable ────────────────────────────────────────────────────
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create and activate venv, install dependencies
        run: |
          python -m venv .venv
          .venv\Scripts\activate
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows executable
        run: |
          .venv\Scripts\activate
          pyinstaller --onefile --windowed `
            --collect-all customtkinter `
            --distpath build `
            --workpath C:\Temp\pyinstaller-build `
            --name TestBoard `
            testBoard_script.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TestBoard-Windows
          path: build/TestBoard.exe

  # ── Arduino sketch verification ───────────────────────────────────────────
  verify-arduino:
    name: Verify Arduino Sketch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh \
            | BINDIR=/usr/local/bin sh
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Compile sketch
        run: |
          mkdir -p /tmp/sketch/testBoard_arduino_code
          cp testBoard_arduino_code.ino /tmp/sketch/testBoard_arduino_code/
          arduino-cli compile --fqbn arduino:avr:uno /tmp/sketch/testBoard_arduino_code
